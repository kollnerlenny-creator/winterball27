<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Winter Ball 2027 · Anmeldung</title>
<style>
  :root{
    --bg-1:#0a0e1a; --bg-2:#131c30; --bg-3:#1c2a45;
    --glass:rgba(255,255,255,0.07); --glass-border:rgba(255,255,255,0.14);
    --text:#eef2fb; --text-dim:#9aa7c2;
    --accent:#dfe9ff; --accent-glow:#8fb4ff;
    --error:#ff8080; --success:#7fe0a8;
    --radius:20px; --radius-sm:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100vh;
    background:
      radial-gradient(ellipse 700px 500px at 50% -10%, rgba(150,180,255,0.18), transparent 60%),
      linear-gradient(180deg,var(--bg-1),var(--bg-2) 50%,var(--bg-3));
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    padding:32px 16px;
    position:relative; overflow-x:hidden;
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, #fff, transparent),
      radial-gradient(1px 1px at 40% 85%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 90% 55%, #fff, transparent),
      radial-gradient(1px 1px at 10% 65%, #fff, transparent);
    opacity:0.4;
  }
  .card{
    position:relative; width:100%; max-width:440px;
    background:var(--glass); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid var(--glass-border); border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    padding:40px 28px 32px;
  }
  .moon{
    width:64px; height:64px; margin:0 auto 8px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff, #d8e2f5 60%, #b7c6e8);
    box-shadow:0 0 40px 8px rgba(200,220,255,0.35);
  }
  h1{
    text-align:center; font-weight:300; letter-spacing:0.5px;
    font-size:32px; margin-bottom:2px;
  }
  h1 span{display:block; font-size:44px; font-family:'Brush Script MT',cursive; font-style:italic; font-weight:400;}
  .subtitle{
    text-align:center; color:var(--text-dim); font-size:13px;
    letter-spacing:2px; text-transform:uppercase; margin-bottom:28px;
  }
  .field{margin-bottom:16px;}
  label{
    display:block; font-size:12px; color:var(--text-dim);
    margin-bottom:6px; letter-spacing:0.3px;
  }
  input{
    width:100%; padding:14px 16px; font-size:15px;
    background:rgba(255,255,255,0.05); border:1px solid var(--glass-border);
    border-radius:var(--radius-sm); color:var(--text); outline:none;
    transition:border-color 0.2s, background 0.2s;
    -webkit-appearance:none; appearance:none;
  }
  input::placeholder{color:rgba(255,255,255,0.3);}
  input:focus{border-color:var(--accent-glow); background:rgba(255,255,255,0.08);}

  .companions-label{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
  }
  .companions-label label{margin-bottom:0;}
  .add-companion{
    background:none; border:none; color:var(--accent-glow); font-size:12px;
    cursor:pointer; padding:4px 0;
  }
  .companion-row{display:flex; gap:8px; margin-bottom:8px;}
  .companion-row input{flex:1;}
  .remove-companion{
    background:rgba(255,128,128,0.1); border:1px solid rgba(255,128,128,0.25);
    color:var(--error); border-radius:var(--radius-sm); width:44px; cursor:pointer; font-size:16px;
  }

  button[type="submit"]{
    width:100%; margin-top:10px; padding:16px;
    background:linear-gradient(135deg, var(--accent), var(--accent-glow));
    color:#0a0e1a; font-weight:600; font-size:15px; letter-spacing:0.5px;
    border:none; border-radius:var(--radius-sm); cursor:pointer;
    transition:transform 0.15s ease-out, box-shadow 0.15s ease-out;
    min-height:48px;
  }
  button[type="submit"]:hover{transform:translateY(-1px); box-shadow:0 8px 24px rgba(143,180,255,0.35);}
  button[type="submit"]:disabled{opacity:0.6; cursor:not-allowed; transform:none;}
  .status{
    margin-top:16px; padding:14px 16px; border-radius:var(--radius-sm);
    font-size:14px; text-align:center; display:none;
  }
  .status.error{display:block; background:rgba(255,128,128,0.12); color:var(--error); border:1px solid rgba(255,128,128,0.3);}
  .success-view{display:none; text-align:center;}
  .success-view.active{display:block;}
  .form-view.hidden{display:none;}
  .success-icon{
    width:56px; height:56px; margin:0 auto 16px; border-radius:50%;
    background:rgba(127,224,168,0.15); border:1px solid rgba(127,224,168,0.4);
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .success-view h2{font-weight:400; font-size:22px; margin-bottom:8px;}
  .success-view p{color:var(--text-dim); font-size:14px; line-height:1.6;}
  .date-badge{
    text-align:center; margin-top:24px; padding-top:20px;
    border-top:1px solid var(--glass-border);
    color:var(--text-dim); font-size:13px; letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="moon"></div>
  <h1><span>Winter Ball</span></h1>
  <div class="subtitle">Anmeldung</div>

  <div class="form-view" id="formView">
    <form id="regForm">
      <div class="field">
        <label for="name">Dein Name</label>
        <input type="text" id="name" placeholder="Max Mustermann" required>
      </div>
      <div class="field">
        <label for="email">Deine E-Mail-Adresse</label>
        <input type="email" id="email" placeholder="max@beispiel.de" required>
      </div>

      <div class="field">
        <div class="companions-label">
          <label>Begleitpersonen (optional)</label>
          <button type="button" class="add-companion" id="addCompanionBtn">+ Person hinzufügen</button>
        </div>
        <div id="companionsList"></div>
      </div>

      <button type="submit" id="submitBtn">Jetzt anmelden</button>
      <div class="status" id="status"></div>
    </form>
  </div>

  <div class="success-view" id="successView">
    <div class="success-icon">✓</div>
    <h2>Anmeldung eingegangen!</h2>
    <p>Bitte hol dir deine Karte(n) im Vorverkauf in der Schule ab und bezahle dort bar.<br>Alle Tickets mit QR-Code werden dir direkt nach der Bezahlung in einer E-Mail zugeschickt.</p>
  </div>

  <div class="date-badge">30.01.2027 · 17:30 Uhr</div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQaRxga3bFrNkyU6E_sQpp5_0G4ApInOg",
    authDomain: "winterball-27.firebaseapp.com",
    projectId: "winterball-27",
    storageBucket: "winterball-27.firebasestorage.app",
    messagingSenderId: "487160103602",
    appId: "1:487160103602:web:961a10f85bfdf77d3f7fab"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Muss dieselbe URL sein wie in admin.html
  const WORKER_URL = "https://winterball-worker.kollnerlenny.workers.dev";

  const companionsList = document.getElementById('companionsList');
  document.getElementById('addCompanionBtn').addEventListener('click', () => addCompanionRow());

  function addCompanionRow(){
    const row = document.createElement('div');
    row.className = 'companion-row';
    row.innerHTML = `
      <input type="text" class="companion-name" placeholder="Name der Begleitung">
      <button type="button" class="remove-companion">×</button>
    `;
    row.querySelector('.remove-companion').addEventListener('click', () => row.remove());
    companionsList.appendChild(row);
  }

  const form = document.getElementById('regForm');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');

  function genTicketId(){
    return 'WB27-' + Math.random().toString(36).slice(2,8).toUpperCase();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.className = 'status';
    statusEl.textContent = '';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const companionNames = Array.from(document.querySelectorAll('.companion-name'))
      .map(i => i.value.trim())
      .filter(v => v.length > 0);

    if(!name || !email){
      statusEl.className = 'status error';
      statusEl.textContent = 'Bitte Name und E-Mail ausfüllen.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Wird angemeldet...';

    try {
      // 1) Bestellung anlegen (unbezahlt) — enthält den Besteller + Namen der Begleitungen
      const regRef = await addDoc(collection(db, 'registrations'), {
        name, email, companions: companionNames,
        paid: false, createdAt: serverTimestamp()
      });

      // 2) Ein eigenes Ticket pro Person (Besteller + jede Begleitung), alle mit
      //    derselben E-Mail und registrationId verknüpft, jedes mit eigenem QR-Code.
      const batch = writeBatch(db);
      const allAttendees = [name, ...companionNames];
      allAttendees.forEach(attendeeName => {
        const ticketRef = doc(collection(db, 'tickets'));
        batch.set(ticketRef, {
          registrationId: regRef.id,
          name: attendeeName,
          email,
          ticketId: genTicketId(),
          paid: false,
          checkedIn: false,
          createdAt: serverTimestamp()
        });
      });
      await batch.commit();

      // Bestätigungsmail direkt nach der Anmeldung anstoßen (Ticket-Mail folgt erst nach Bezahlung)
      try {
        await fetch(WORKER_URL + '/send-confirmation', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, email, attendeeNames: allAttendees })
        });
      } catch (mailErr) {
        console.error('Bestätigungsmail fehlgeschlagen:', mailErr);
      }

      document.getElementById('formView').classList.add('hidden');
      document.getElementById('successView').classList.add('active');

    } catch(err){
      console.error(err);
      statusEl.className = 'status error';
      statusEl.textContent = 'Etwas ist schiefgelaufen. Bitte versuch es erneut.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Jetzt anmelden';
    }
  });
</script>
</body>
</html>
